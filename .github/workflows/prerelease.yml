name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v7

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Test
        run: zig build test --summary all

  prerelease:
    name: Prerelease
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v7

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build Windows x86_64
        run: zig build -Dtarget=x86_64-windows -Doptimize=ReleaseSafe -Dexe-name=tip-windows-x86_64

      - name: Build macOS x86_64
        run: zig build -Dtarget=x86_64-macos -Doptimize=ReleaseSafe -Dexe-name=tip-macos-x86_64

      - name: Build macOS ARM64
        run: zig build -Dtarget=aarch64-macos -Doptimize=ReleaseSafe -Dexe-name=tip-macos-arm64

      - name: Build Linux x86_64
        run: zig build -Dtarget=x86_64-linux -Doptimize=ReleaseSafe -Dcpu=baseline -Dexe-name=tip-linux-x86_64

      - name: Build Linux ARM64
        run: zig build -Dtarget=aarch64-linux -Doptimize=ReleaseSafe -Dexe-name=tip-linux-arm64

      - name: Package
        run: |
          cd ./zig-out/bin
          mkdir -p dist
          chmod +x tip-macos-x86_64 tip-macos-arm64 tip-linux-x86_64 tip-linux-arm64
          for t in macos-x86_64 macos-arm64 linux-x86_64 linux-arm64; do
            mkdir -p "dist/tip-$t"
            cp "tip-$t" "dist/tip-$t/tip"
            cp ../../LICENSE "dist/tip-$t/"
            tar -C dist -czf "dist/tip-$t.tar.gz" "tip-$t"
          done
          mkdir -p dist/tip-windows-x86_64
          cp tip-windows-x86_64.exe dist/tip-windows-x86_64/tip.exe
          cp ../../LICENSE dist/tip-windows-x86_64/
          (cd dist && zip -r tip-windows-x86_64.zip tip-windows-x86_64)
          cd dist
          sha256sum tip-macos-x86_64.tar.gz tip-macos-arm64.tar.gz tip-linux-x86_64.tar.gz tip-linux-arm64.tar.gz tip-windows-x86_64.zip > checksums.txt

      - name: Delete existing prerelease tag
        run: gh release delete nightly --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly (latest main)
          prerelease: true
          body: |
            Automated prerelease from main branch.
            Commit: ${{ github.sha }}
          files: |
            ./zig-out/bin/dist/tip-macos-x86_64.tar.gz
            ./zig-out/bin/dist/tip-macos-arm64.tar.gz
            ./zig-out/bin/dist/tip-linux-x86_64.tar.gz
            ./zig-out/bin/dist/tip-linux-arm64.tar.gz
            ./zig-out/bin/dist/tip-windows-x86_64.zip
            ./zig-out/bin/dist/checksums.txt
            LICENSE
